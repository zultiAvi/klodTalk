server:
  host: "0.0.0.0"
  port: 3174
  docker: true
  ssl_cert: ""   # Path to server.crt — leave empty for plain ws://
  ssl_key: ""    # Path to server.key — leave empty for plain ws://

claude:
  auth_method: "session"    # "session" | "api_key"

git:
  protocol: "ssh"           # "ssh" | "https"

auto_update:
  enabled: false          # must be explicitly opted in
  check_interval_minutes: 5
  branch: "main"

# Model shorthand resolution (used in team member tables):
#   opus   -> claude-opus-4-7
#   sonnet -> claude-sonnet-4-6
#   haiku  -> claude-haiku-4-5-20251001
# Retired models (do not use): claude-3-haiku-20240307, claude-sonnet-4-20250514,
# claude-opus-4-20250514. See CLAUDE/skills/model-version-hygiene.md for details.

routine:
  enabled: true            # opt-in, like auto_update
  schedule_hour: 4          # 24h format, local time
  schedule_minute: 0
  github_search_tags:
    - "claude"
    - "claude-code"
    - "claude-skill"
    - "claude-agent"
    - "claude-mcp"
    - "anthropic"
  max_ideas_to_implement: 3
  team: "nightly-scout"      # Team pipeline for the routine (omit for single-agent mode)
  project: "klod_talk"               # Must be set to a valid project name
